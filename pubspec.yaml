name: flutter_music_player
description: A cross-platform local music player with advanced audio features.
publish_to: 'none'
version: 1.0.0+1
uses-material-design: true

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  flutter_colorpicker: ^1.0.3
  animations: ^2.0.11

  just_audio: ^0.9.36
  just_audio_windows: ^0.2.0
  audio_session: ^0.1.18

  audioplayers: ^5.2.1
  audio_metadata_reader: ^1.4.2

  amlv: ^1.0.2

  file_picker: ^6.1.1
  path_provider: ^2.1.1
  path: ^1.8.3

  dio: ^5.4.0

  window_manager: ^0.3.7

  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  cached_network_image: ^3.3.0
  image: ^4.1.3

  uuid: ^4.2.1
  intl: ^0.20.2
  palette_generator: ^0.3.3+3

  upnped: ^1.1.2
  screen_brightness: ^0.2.2+1
  lpinyin: ^2.0.3
  scrollable_positioned_list: ^0.3.8
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7